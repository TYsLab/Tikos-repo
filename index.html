<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketPulse — Weekly Financial Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #060b18;
  --card: #0b1221;
  --card2: #0f1a2e;
  --border: #1c2d45;
  --border2: #243a57;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --blue: #3b82f6;
  --blue-dim: #1d4ed8;
  --cyan: #06b6d4;
  --green: #22c55e;
  --red: #ef4444;
  --gold: #f59e0b;
  --purple: #818cf8;
  --sidebar: 240px;
  --radius: 8px;
  --radius-lg: 12px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

.mono { font-family: 'JetBrains Mono', monospace; }

/* Layout */
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: var(--sidebar);
  min-width: var(--sidebar);
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 100;
}

.sidebar-logo {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.logo-text {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 10px;
  color: var(--text3);
  font-weight: 400;
  display: block;
  margin-top: 1px;
}

.sidebar-nav {
  flex: 1;
  padding: 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
}

.nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s ease;
  font-size: 13.5px;
  font-weight: 500;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nav-link:hover {
  background: rgba(59, 130, 246, 0.08);
  color: var(--text);
}

.nav-link.active {
  background: rgba(59, 130, 246, 0.15);
  color: var(--blue);
}

.nav-link svg { flex-shrink: 0; opacity: 0.8; }
.nav-link.active svg { opacity: 1; }

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid var(--border);
}

.sidebar-week-info {
  background: rgba(59, 130, 246, 0.06);
  border: 1px solid rgba(59, 130, 246, 0.2);
  border-radius: var(--radius);
  padding: 10px 12px;
}

.sidebar-week-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  font-weight: 600;
  margin-bottom: 4px;
}

.sidebar-week-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 600;
  color: var(--blue);
  line-height: 1;
}

.sidebar-week-date {
  font-size: 11px;
  color: var(--text3);
  margin-top: 3px;
}

/* Main area */
.main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--bg);
}

.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.main::-webkit-scrollbar-thumb:hover { background: var(--text3); }

.view {
  min-height: 100%;
  padding: 28px 32px;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Page headers */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.page-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.4px;
}

.page-subtitle {
  font-size: 13px;
  color: var(--text3);
  margin-top: 3px;
}

/* Cards */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}

.card-sm {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
}

/* Summary row */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

.summary-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}

.summary-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}

.summary-card.blue::before { background: linear-gradient(90deg, var(--blue), var(--cyan)); }
.summary-card.green::before { background: linear-gradient(90deg, var(--green), #10b981); }
.summary-card.red::before { background: linear-gradient(90deg, var(--red), #f97316); }
.summary-card.gold::before { background: linear-gradient(90deg, var(--gold), #fbbf24); }

.sc-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  font-weight: 600;
  margin-bottom: 10px;
}

.sc-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px;
  font-weight: 600;
  color: var(--text);
  line-height: 1;
  margin-bottom: 6px;
}

.sc-sub {
  font-size: 12px;
  color: var(--text3);
}

.sc-change {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  margin-top: 4px;
}

.sc-change.pos { color: var(--green); }
.sc-change.neg { color: var(--red); }

/* Table */
.table-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 24px;
}

.table-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.table-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text3);
  font-weight: 600;
  padding: 10px 16px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  background: rgba(28, 45, 69, 0.3);
}

th:first-child { text-align: left; }

td {
  padding: 11px 16px;
  border-bottom: 1px solid rgba(28, 45, 69, 0.5);
  font-size: 13.5px;
  text-align: right;
  color: var(--text2);
}

td:first-child { text-align: left; color: var(--text); }

tr:last-child td { border-bottom: none; }

tr.data-row:hover td { background: rgba(59, 130, 246, 0.04); }

.cat-row td {
  background: rgba(28, 45, 69, 0.5);
  color: var(--text3);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  font-weight: 600;
  padding: 7px 16px;
  border-bottom: 1px solid var(--border);
  text-align: left;
}

.val-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}

.pos { color: var(--green); }
.neg { color: var(--red); }
.neutral { color: var(--text3); }

/* Asset dot */
.asset-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin-right: 8px;
  flex-shrink: 0;
}

.asset-name-cell {
  display: flex;
  align-items: center;
}

/* Heatmap */
.heatmap-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 24px;
}

.heatmap-scroll {
  overflow-x: auto;
  padding: 16px;
}

.heatmap-scroll::-webkit-scrollbar { height: 6px; }
.heatmap-scroll::-webkit-scrollbar-track { background: transparent; }
.heatmap-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.heatmap-grid {
  display: grid;
  gap: 3px;
  min-width: max-content;
}

.hm-cell {
  width: 62px;
  height: 36px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  cursor: default;
  position: relative;
  transition: transform 0.1s ease;
}

.hm-cell:hover { transform: scale(1.05); z-index: 10; }

.hm-label-asset {
  width: 130px;
  height: 36px;
  display: flex;
  align-items: center;
  font-size: 11px;
  color: var(--text2);
  font-weight: 500;
  padding-right: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.hm-label-week {
  width: 62px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
}

/* Notes card */
.notes-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 24px;
}

.notes-content {
  color: var(--text2);
  font-size: 13.5px;
  line-height: 1.7;
  white-space: pre-wrap;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.15s ease;
  font-family: 'Inter', sans-serif;
}

.btn-primary {
  background: var(--blue);
  color: #fff;
}

.btn-primary:hover { background: #2563eb; }

.btn-secondary {
  background: rgba(59, 130, 246, 0.1);
  color: var(--blue);
  border: 1px solid rgba(59, 130, 246, 0.25);
}

.btn-secondary:hover { background: rgba(59, 130, 246, 0.18); }

.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border2);
}

.btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text); }

.btn-danger {
  background: rgba(239, 68, 68, 0.1);
  color: var(--red);
  border: 1px solid rgba(239, 68, 68, 0.25);
}

.btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Form */
.form-section {
  margin-bottom: 28px;
}

.form-section-header {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  font-weight: 600;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.form-section-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}

.form-field {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.form-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
}

.form-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  margin-left: auto;
}

.form-input {
  background: rgba(28, 45, 69, 0.5);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 12px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s ease;
  width: 100%;
}

.form-input:focus {
  border-color: var(--blue);
  background: rgba(59, 130, 246, 0.05);
}

.form-input.error { border-color: var(--red); }

.form-error {
  font-size: 11px;
  color: var(--red);
  display: none;
}

.form-field.has-error .form-error { display: block; }
.form-field.has-error .form-input { border-color: var(--red); }

.form-textarea {
  background: rgba(28, 45, 69, 0.5);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13.5px;
  outline: none;
  transition: border-color 0.15s ease;
  width: 100%;
  resize: vertical;
  min-height: 100px;
  line-height: 1.6;
}

.form-textarea:focus { border-color: var(--blue); }

.form-actions {
  display: flex;
  gap: 10px;
  padding-top: 8px;
}

/* Archive */
.archive-search {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.search-input {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 14px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s ease;
  width: 280px;
  font-family: 'Inter', sans-serif;
}

.search-input:focus { border-color: var(--blue); }

.badge {
  background: rgba(59, 130, 246, 0.1);
  color: var(--blue);
  border: 1px solid rgba(59, 130, 246, 0.2);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
}

.archive-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.archive-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  transition: border-color 0.15s ease;
}

.archive-card:hover { border-color: var(--border2); }

.ac-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 14px;
}

.ac-week {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--blue);
}

.ac-date {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
}

.ac-mini-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}

.ac-mini-item {
  background: rgba(28, 45, 69, 0.5);
  border-radius: 6px;
  padding: 8px 10px;
}

.ac-mini-label {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
}

.ac-mini-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.ac-notes {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.5;
  margin-bottom: 14px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.ac-actions {
  display: flex;
  gap: 8px;
}

/* Charts */
.chart-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.pill-group {
  display: flex;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px;
  gap: 2px;
}

.pill {
  padding: 5px 12px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text3);
  font-family: 'Inter', sans-serif;
  transition: all 0.15s ease;
}

.pill:hover { color: var(--text); }

.pill.active {
  background: var(--blue);
  color: #fff;
}

.chart-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 24px;
}

.chart-wrap {
  position: relative;
  height: 400px;
}

/* Variance table */
.variance-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.variance-scroll {
  overflow-x: auto;
}

.variance-scroll::-webkit-scrollbar { height: 6px; }
.variance-scroll::-webkit-scrollbar-track { background: transparent; }
.variance-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.variance-table th, .variance-table td {
  min-width: 90px;
  font-size: 11px;
  padding: 8px 10px;
}

.variance-table th:first-child, .variance-table td:first-child {
  min-width: 140px;
  position: sticky;
  left: 0;
  background: var(--card);
  z-index: 1;
}

.var-cell {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 1px;
}

.var-abs {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}

.var-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  opacity: 0.75;
}

/* Detail view */
.detail-back {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text3);
  cursor: pointer;
  font-size: 13px;
  margin-bottom: 20px;
  transition: color 0.15s ease;
}

.detail-back:hover { color: var(--blue); }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  text-align: center;
}

.empty-icon {
  width: 64px;
  height: 64px;
  background: rgba(59, 130, 246, 0.08);
  border: 1px solid rgba(59, 130, 246, 0.15);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}

.empty-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}

.empty-desc {
  font-size: 13.5px;
  color: var(--text3);
  max-width: 360px;
  line-height: 1.6;
  margin-bottom: 24px;
}

.empty-actions {
  display: flex;
  gap: 10px;
}

/* Toast */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 9999;
  pointer-events: none;
}

.toast {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  animation: toastIn 0.25s ease;
  pointer-events: auto;
  max-width: 320px;
}

.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }
.toast.info { border-left: 3px solid var(--blue); }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes toastOut {
  from { opacity: 1; transform: translateX(0); }
  to { opacity: 0; transform: translateX(20px); }
}

/* Tooltip */
.tooltip {
  position: fixed;
  background: #0f1a2e;
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 11px;
  color: var(--text);
  pointer-events: none;
  z-index: 9000;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  display: none;
}

/* Divider */
.divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

/* Misc */
.section-header {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.text-muted { color: var(--text3); }
.text-blue { color: var(--blue); }
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.text-gold { color: var(--gold); }

const YAHOO_TICKERS = {
  sp500:  '^GSPC',
  nasdaq: '^IXIC',
  ftse:   '^FTSE',
  dax:    '^GDAXI',
  vix:    '^VIX',

const PROXY = 'https://corsproxy.io/?url=';

async function yahooFetch(ticker, period1, period2) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1wk&period1=${period1}&period2=${period2}&includePrePost=false`;
  for (const useProxy of [false, true]) {
    try {
      const finalUrl = useProxy ? PROXY + encodeURIComponent(url) : url;
      const res = await fetch(finalUrl);
      if (!res.ok) continue;
      const json = await res.json();
      const result = json?.chart?.result?.[0];
      if (result) return result;
    } catch(e) { continue; }
  }
  return null;
}

async function fredFetch(seriesId) {
  const url = `https://fred.stlouisfed.org/graph/fredgraph.json?id=${seriesId}`;
  for (const useProxy of [false, true]) {
    try {
      const finalUrl = useProxy ? PROXY + encodeURIComponent(url) : url;
      const res = await fetch(finalUrl);
      if (!res.ok) continue;
      const json = await res.json();
      if (Array.isArray(json) && json.length > 0) return json;
    } catch(e) { continue; }
  }
  return null;
}

async function getLatestWeeklyClose(ticker) {
  const now = Math.floor(Date.now() / 1000);
  const twoWeeksAgo = now - 14 * 86400;
  const result = await yahooFetch(ticker, twoWeeksAgo, now + 86400);
  if (!result) return null;
  const closes = result.indicators?.quote?.[0]?.close || [];
  for (let i = closes.length - 1; i >= 0; i--) {
    if (closes[i] != null) return closes[i];
  }
  return null;
}

async function getAllWeeklyCloses(ticker) {
  const baseTs = Math.floor(new Date('2025-01-19').getTime() / 1000);
  const now = Math.floor(Date.now() / 1000);
  const result = await yahooFetch(ticker, baseTs, now + 86400);
  if (!result) return null;
  const timestamps = result.timestamp || [];
  const closes = result.indicators?.quote?.[0]?.close || [];
  return timestamps.map((ts, i) => ({ weekStart: new Date(ts * 1000), close: closes[i] })).filter(d => d.close != null);
}

function mapBarsToWeeks(bars) {
  const BASE = new Date('2025-01-22');
  const out = {};
  bars.forEach(bar => {
    const diffWeeks = Math.round((bar.weekStart - BASE) / (7 * 24 * 3600 * 1000));
    const weekNum = diffWeeks + 1;
    if (weekNum >= 1) out[weekNum] = bar.close;
  });
  return out;
}

async function autoFillCurrentWeek() {
  const btn = document.getElementById('autofill-btn');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = '⟳ Fetching live data...';

  const results = {};
  let filled = 0;

  // Yahoo Finance assets
  for (const [id, ticker] of Object.entries(YAHOO_TICKERS)) {
    try {
      const val = await getLatestWeeklyClose(ticker);
      if (val != null) { results[id] = val; filled++; }
    } catch(e) {}
  }

  // FRED rates
  for (const [id, series] of Object.entries(FRED_SERIES)) {
    try {
      const obs = await fredFetch(series);
      if (obs && obs.length > 0) {
        // FRED returns [[date, value], ...] or [{date,value}]
        const last = obs[obs.length - 1];
        let val = parseFloat(Array.isArray(last) ? last[1] : last.value);
        if (!isNaN(val)) {
          if (id === 'spread') val = Math.round(val * 100);
          results[id] = val;
          filled++;
        }
      }
    } catch(e) {}
  }

  // Populate inputs
  Object.entries(results).forEach(([id, val]) => {
    const input = document.getElementById('input-' + id);
    const asset = ASSETS.find(a => a.id === id);
    if (input && asset) {
      input.value = parseFloat(val).toFixed(asset.dec);
      input.style.borderColor = '#06b6d4';
      input.style.background = 'rgba(6,182,212,0.06)';
    }
  });

  btn.disabled = false;
  if (filled > 0) {
    btn.textContent = `✓ Filled ${filled} fields — verify rates`;
    btn.style.cssText += 'background:rgba(34,197,94,0.12);border-color:#22c55e;color:#22c55e;';
    toast(`Auto-filled ${filled} fields from live market data`, 'success');

    btn.textContent = '⚠ Fetch failed — check connection';
    btn.style.cssText += 'background:rgba(239,68,68,0.12);border-color:#ef4444;color:#ef4444;';
    toast('Could not reach market data — check connection', 'error');
  }
}

async function backfillAllWeeks() {
  const btn = document.getElementById('backfill-btn');
  const statusEl = document.getElementById('backfill-status');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = '⟳ Fetching...';

  function setStatus(msg) { if (statusEl) statusEl.textContent = msg; }

  const allBars = {};

  // Yahoo assets
  for (const [id, ticker] of Object.entries(YAHOO_TICKERS)) {
    const asset = ASSETS.find(a => a.id === id);
    setStatus(`Fetching ${asset?.label || id}...`);
    try {
      const bars = await getAllWeeklyCloses(ticker);
      if (bars) allBars[id] = mapBarsToWeeks(bars);
    } catch(e) {}
    await new Promise(r => setTimeout(r, 350));
  }

  // FRED rates
  for (const [id, series] of Object.entries(FRED_SERIES)) {
    const asset = ASSETS.find(a => a.id === id);
    setStatus(`Fetching ${asset?.label || id}...`);
    try {
      const obs = await fredFetch(series);
      if (obs) {
        allBars[id] = {};
        obs.forEach(o => {
          const date = new Date(Array.isArray(o) ? o[0] : o.date);
          let val = parseFloat(Array.isArray(o) ? o[1] : o.value);
          if (isNaN(val)) return;
          const diffWeeks = Math.round((date - new Date('2025-01-22')) / (7 * 24 * 3600 * 1000));
          const weekNum = diffWeeks + 1;
          if (weekNum >= 1) {
            let finalVal = id === 'spread' ? Math.round(val * 100) : val;
            if (allBars[id][weekNum] === undefined) allBars[id][weekNum] = finalVal;
          }
        });
      }
    } catch(e) {}
    await new Promise(r => setTimeout(r, 350));
  }

  // Collect all week numbers
  const weekNums = new Set();
  Object.values(allBars).forEach(bars => Object.keys(bars).forEach(k => weekNums.add(parseInt(k))));

  if (weekNums.size === 0) {
    setStatus('⚠ No data fetched — check internet connection');
    btn.disabled = false;
    btn.textContent = '↺ Retry';
    toast('Could not fetch historical data', 'error');
    return;
  }

  const data = loadData();
  let savedCount = 0;

  [...weekNums].sort((a, b) => a - b).forEach(weekNum => {
    if (!allBars.sp500?.[weekNum] && !allBars.nasdaq?.[weekNum]) return;
    if (data.weeks.find(w => w.id === weekNum)) return; // preserve manual entries
    const weekData = { id: weekNum, notes: '' };
    ASSETS.forEach(a => { weekData[a.id] = allBars[a.id]?.[weekNum] ?? null; });
    data.weeks.push(weekData);
    savedCount++;
  });

  data.weeks.sort((a, b) => a.id - b.id);
  saveData(data);

  setStatus(savedCount > 0 ? `✓ Loaded ${savedCount} weeks of live data` : '✓ No new weeks (existing data preserved)');
  btn.disabled = false;
  btn.textContent = savedCount > 0 ? `✓ ${savedCount} weeks loaded` : '✓ Up to date';

  if (savedCount > 0) {
    toast(`Backfilled ${savedCount} weeks of historical market data`, 'success');
    setTimeout(() => navigate('dashboard'), 1500);
  } else {
    toast('All weeks already present — nothing overwritten', 'info');
  }
}

async function loadFromAPI() {
  try {
    const res  = await fetch(API_URL);
    const rows = await res.json();

    // Map old date labels to Week numbers
    const DATE_TO_WEEK = {
      'Jan 22': 'Week 1', 'Jan 29': 'Week 2', 'Feb 5':  'Week 3',
      'Feb 12': 'Week 4', 'Feb 19': 'Week 5', 'Feb 26': 'Week 6',
      'Mar 5':  'Week 7', 'Mar 12': 'Week 8', 'Mar 19': 'Week 9',
      'Mar 26': 'Week 10', 'Mar 14, 2026': 'Week 8'
    };

    // Map API asset names → website asset IDs
    const ASSET_NAME_TO_ID = {
      'S&P 500':           'sp500',
      'NASDAQ Composite':  'nasdaq',
      'FTSE 100':          'ftse',
      'DAX':               'dax',
      'VIX':               'vix',
      'Gold ($/oz)':       'gold',
      'Oil WTI ($/bbl)':   'oil',
      'Nat Gas ($/MMBtu)': 'gas',
      'Fed Funds Rate':    'fedFunds',
      '2Y Treasury (%)':   't2y',
      '5Y Treasury (%)':   't5y',
      '10Y Treasury (%)':  't10y',
      '30Y Treasury (%)':  't30y',
      '2Y/10Y Spread':     'spread',
    };

    // Group rows into the { weeks: [...] } structure the app expects
    const weekMap = {};
    for (const row of rows) {
      const raw    = row.AssetDate;
      const w      = DATE_TO_WEEK[raw] || raw;
      const assetId = ASSET_NAME_TO_ID[row.Asset];
      if (!assetId) continue;
      if (!weekMap[w]) weekMap[w] = { id: w, notes: '' };
      weekMap[w][assetId] = row.ClosePrice;
    }

    // Convert ids to numbers and sort
    const weeks = Object.values(weekMap).map(w => ({
      ...w,
      id: parseInt(w.id.replace('Week ', '')) || 0
    })).sort((a, b) => a.id - b.id);

    const data = { weeks };
    saveData(data); // cache in localStorage
    return data;
  } catch(e) {
    console.warn('API fetch failed, using localStorage:', e);
    return loadData();
  }
}

// ─── FORMATTERS ──────────────────────────────────────────────────────────────

function fmtVal(asset, val) {
  if (val === null || val === undefined) return '—';
  const v = Number(val);
  if (asset.unit === '$') return '$' + v.toLocaleString('en-US', { minimumFractionDigits: asset.dec, maximumFractionDigits: asset.dec });
  if (asset.unit === '%') return v.toFixed(asset.dec) + '%';
  if (asset.unit === 'bps') return (v >= 0 ? '+' : '') + v.toFixed(0) + ' bps';
  if (asset.unit === 'index') return v.toLocaleString('en-US', { minimumFractionDigits: asset.dec, maximumFractionDigits: asset.dec });
  return v.toFixed(asset.dec);
}

function fmtChg(val, dec) {
  if (val === null || val === undefined) return '—';
  const v = Number(val);
  const sign = v >= 0 ? '+' : '';
  return sign + v.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function fmtPct(val) {
  if (val === null || val === undefined) return '—';
  const v = Number(val);
  const sign = v >= 0 ? '+' : '';
  return sign + v.toFixed(2) + '%';
}

function getChange(cur, prior) {
  if (prior === undefined || prior === null) return null;
  const abs = cur - prior;
  const pct = (cur - prior) / Math.abs(prior) * 100;
  return { abs, pct };
}

function chgClass(val) {
  if (val === null || val === undefined) return 'neutral';
  return Number(val) >= 0 ? 'pos' : 'neg';
}

// ─── HEATMAP COLOR ───────────────────────────────────────────────────────────

function heatColor(pct) {
  if (pct === null || pct === undefined) return '#1c2d45';
  const v = Math.max(-5, Math.min(5, pct));
  if (v >= 0) {
    const t = v / 5;
    const r = Math.round(34 * (1 - t));
    const g = Math.round(197 * t + 30 * (1 - t));
    const b = Math.round(94 * t + 60 * (1 - t));
    return `rgba(${r},${g},${b},${0.2 + 0.6 * t})`;
  } else {
    const t = Math.abs(v) / 5;
    const r = Math.round(239 * t + 30 * (1 - t));
    const g = Math.round(30 * (1 - t) * 0.3);
    const b = Math.round(30 * (1 - t) * 0.3);
    return `rgba(${r},${g},${b},${0.2 + 0.6 * t})`;
  }
}

// ─── TOAST ───────────────────────────────────────────────────────────────────

function toast(msg, type = 'success') {
  const icons = {
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>',
    error: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    info: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
  };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `${icons[type] || ''}<span>${msg}</span>`;
  const container = document.getElementById('toast-container');
  container.appendChild(el);
  setTimeout(() => {
    el.style.animation = 'toastOut 0.25s ease forwards';
    setTimeout(() => el.remove(), 250);
  }, 3000);
}

// ─── TOOLTIP ─────────────────────────────────────────────────────────────────

function setupTooltips() {
  const tip = document.getElementById('tooltip');
  document.addEventListener('mousemove', e => {
    const el = e.target.closest('[data-tip]');
    if (el) {
      tip.textContent = el.dataset.tip;
      tip.style.display = 'block';
      tip.style.left = (e.clientX + 12) + 'px';
      tip.style.top = (e.clientY - 28) + 'px';
    } else {
      tip.style.display = 'none';
    }
  });
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────

function navigate(view, params = {}) {
  // Destroy chart if switching away
  if (chartInstance && view !== 'charts') {
    chartInstance.destroy();
    chartInstance = null;
  }

  currentView = view;
  currentParams = params;

  // Update nav
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + view);
  if (navEl) navEl.classList.add('active');

  // Render
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  const views = { dashboard: renderDashboard, entry: renderEntry, table: renderTable, archive: renderArchive, charts: renderCharts, detail: renderDetail };
  if (views[view]) views[view](params);

  updateSidebar();
}

function updateSidebar() {
  const data = loadData();
  const weeks = data.weeks;
  const el = document.getElementById('sidebar-week-num');
  const dateEl = document.getElementById('sidebar-week-date');
  if (weeks.length > 0) {
    const last = weeks[weeks.length - 1];
    el.textContent = 'Week ' + last.id;
    dateEl.textContent = '';
  } else {
    el.textContent = '—';
    dateEl.textContent = 'No data yet';
  }
}

function buildMarketTable(cur, prior) {
  let rows = '';
  CATS.forEach(cat => {
    const assets = ASSETS.filter(a => a.cat === cat.id);
    rows += `<tr class="cat-row"><td colspan="5"><span class="asset-dot" style="background:${CAT_COLORS[cat.id]}"></span>${cat.label}</td></tr>`;
    assets.forEach(a => {
      const curVal = cur[a.id];
      const priorVal = prior ? prior[a.id] : null;
      const chg = priorVal !== null && priorVal !== undefined ? getChange(curVal, priorVal) : null;
      rows += `
        <tr class="data-row">
          <td><div class="asset-name-cell"><span class="asset-dot" style="background:${a.color}"></span>${a.label}</div></td>
          <td class="val-num">${fmtVal(a, curVal)}</td>
          <td class="val-num text-muted">${priorVal !== null && priorVal !== undefined ? fmtVal(a, priorVal) : '—'}</td>
          <td class="val-num ${chg ? chgClass(chg.abs) : 'neutral'}">${chg ? fmtChg(chg.abs, a.dec) : '—'}</td>
          <td class="val-num ${chg ? chgClass(chg.pct) : 'neutral'}">${chg ? fmtPct(chg.pct) : '—'}</td>
        </tr>`;
    });
  });

  return `
    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title">Market Monitor — Week ${cur.id}</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Asset</th>
            <th>Current</th>
            <th>Prior Week</th>
            <th>Change</th>
            <th>% Change</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function buildPerformanceTable(weeks) {
  if (weeks.length === 0) return '';
  const curIdx = weeks.length - 1;
  const cur    = weeks[curIdx];

  const w3m = curIdx >= 13 ? weeks[curIdx - 13] : weeks[0];
  const w1y = curIdx >= 52 ? weeks[curIdx - 52] : null;
  // Map website asset IDs → API asset names
  const ID_TO_NAME = {
    sp500:    'S&P 500',       nasdaq:   'NASDAQ Composite',
    ftse:     'FTSE 100',      dax:      'DAX',
    vix:      'VIX',           gold:     'Gold ($/oz)',
    oil:      'Oil WTI ($/bbl)', gas:    'Nat Gas ($/MMBtu)',
    fedFunds: 'Fed Funds Rate', t2y:     '2Y Treasury (%)',
    t5y:      '5Y Treasury (%)', t10y:   '10Y Treasury (%)',
    t30y:     '30Y Treasury (%)', spread: '2Y/10Y Spread',
  };

  const isRates = a => a.cat === 'rates';

  const cell = (a, curVal, refVal) => {
    if (curVal == null || refVal == null) return `<td class="val-num neutral">—</td>`;
    let display, val;
    if (isRates(a)) {
      val = (curVal - refVal) * 100;
      display = `${val >= 0 ? '+' : ''}${val.toFixed(0)} bps`;
    } else {
      val = ((curVal - refVal) / Math.abs(refVal)) * 100;
      display = `${val >= 0 ? '+' : ''}${val.toFixed(2)}%`;
    }
    const color = val > 0.05 ? 'var(--green)' : val < -0.05 ? 'var(--red)' : 'var(--text2)';
    return `<td class="val-num" style="color:${color};font-weight:500">${display}</td>`;
  };

  let rows = '';
  CATS.forEach(cat => {
    const assets = ASSETS.filter(a => a.cat === cat.id);
    rows += `<tr class="cat-row"><td colspan="4"><span class="asset-dot" style="background:${CAT_COLORS[cat.id]}"></span>${cat.label}</td></tr>`;
    assets.forEach(a => {
      const name   = ID_TO_NAME[a.id];
      const p      = perfData[name];
      const curVal = p?.current ?? cur[a.id];
      const p3m    = p?.price_3m ?? null;
      const p1y    = p?.price_1y ?? null;
      rows += `
        <tr class="data-row">
          <td><div class="asset-name-cell"><span class="asset-dot" style="background:${a.color}"></span>${a.label}</div></td>
          <td class="val-num">${fmtVal(a, curVal)}</td>
          ${cell(a, curVal, p3m)}
          ${cell(a, curVal, p1y)}
        </tr>`;
    });
  });

  const w3mLabel = curIdx >= 13 ? '3 Month' : `3 Month (W1→now)`;
  const w1yLabel = w1y ? '1 Year' : '1 Year —';

  return `
    <div class="table-wrap" style="margin-top:24px">
      <div class="table-header">
        <span class="table-title">Performance</span>
        <span style="font-size:11px;color:var(--text3)">Yields in basis points, all others in %</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Asset</th>
            <th>Current</th>
            <th style="color:var(--cyan)">${w3mLabel}</th>
            <th style="color:var(--purple)">${w1yLabel}</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      ${!w1y ? `<div style="font-size:11px;color:var(--text3);padding:6px 12px">1 Year available after 52 weeks of data (${weeks.length} collected)</div>` : ''}
    </div>`;
}

function buildHeatmap(weeks) {
  if (weeks.length === 0) return '';

  // Week header row
  let headerCells = `<div class="hm-label-asset"></div>`;
  weeks.forEach(w => {
    headerCells += `<div class="hm-label-week">W${w.id}</div>`;
  });

  // Asset rows
  let assetRows = '';
  ASSETS.forEach(a => {
    let rowHTML = `<div class="hm-label-asset"><span class="asset-dot" style="background:${a.color}"></span>${a.label}</div>`;
    weeks.forEach((w, i) => {
      const prior = i > 0 ? weeks[i - 1] : null;
      const chg = prior ? getChange(w[a.id], prior[a.id]) : null;
      const pct = chg ? chg.pct : null;
      const bg = heatColor(pct);
      const tipText = `W${w.id} ${a.label}: ${fmtVal(a, w[a.id])}${chg ? ' (' + fmtPct(chg.pct) + ')' : ''}`;
      rowHTML += `<div class="hm-cell" style="background:${bg}" data-tip="${escHtml(tipText)}">
        ${pct !== null ? `<span style="color:${pct >= 0 ? '#4ade80' : '#f87171'}">${pct >= 0 ? '+' : ''}${pct.toFixed(1)}%</span>` : ''}
      </div>`;
    });
    assetRows += `<div style="display:contents">${rowHTML}</div>`;
  });

  const colCount = weeks.length + 1;

  return `
    <div class="heatmap-wrap">
      <div class="table-header">
        <span class="table-title">Performance Heatmap (Week-over-Week % Change)</span>
      </div>
      <div class="heatmap-scroll">
        <div class="heatmap-grid" style="grid-template-columns: 130px repeat(${weeks.length}, 62px)">
          ${headerCells}
          ${assetRows}
        </div>
      </div>
    </div>`;
}

    const catAssets = ASSETS.filter(a => a.cat === cat.id);

  main.innerHTML = `

function saveWeek(weekNum) {
  // Validate
  let valid = true;
  const values = { id: weekNum };

  ASSETS.forEach(a => {
    const field = document.getElementById('field-' + a.id);
    const input = document.getElementById('input-' + a.id);
    const val = input.value.trim();
    if (val === '') {
      field.classList.add('has-error');
      valid = false;
    } else {
      field.classList.remove('has-error');
      values[a.id] = parseFloat(val);
    }
  });

  if (!valid) {
    toast('Please fill in all required fields', 'error');
    // Scroll to first error
    const firstErr = document.querySelector('.has-error');
    if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  values.notes = document.getElementById('input-notes').value.trim();

  const data = loadData();
  const existingIdx = data.weeks.findIndex(w => w.id === weekNum);
  if (existingIdx >= 0) {
    data.weeks[existingIdx] = values;
  } else {
    data.weeks.push(values);
    data.weeks.sort((a, b) => a.id - b.id);
  }

  saveData(data);
  toast(`Week ${weekNum} saved successfully`, 'success');
  navigate('dashboard');
}

function deleteWeek(weekNum) {
  if (!confirm(`Delete Week ${weekNum} data? This cannot be undone.`)) return;
  const data = loadData();
  data.weeks = data.weeks.filter(w => w.id !== weekNum);
  saveData(data);
  toast(`Week ${weekNum} deleted`, 'info');
  navigate('dashboard');
}

            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
          </div>
          <div class="empty-title">Archive is empty</div>
          <div class="empty-desc">Start tracking markets by entering weekly data, or load sample data to see the archive in action.</div>
          <div class="empty-actions">
            <button class="btn btn-primary" onclick="navigate('entry')">Enter First Week</button>
            <button class="btn btn-ghost" style="border-color:var(--cyan);color:var(--cyan)" onclick="document.querySelector('.empty-state').innerHTML='<div style=\'padding:32px;text-align:center\'><div id=\'backfill-status\' style=\'color:var(--cyan);margin-bottom:16px\'>Starting fetch...</div><button id=\'backfill-btn\' class=\'btn btn-primary\' onclick=\'backfillAllWeeks()\'>↓ Backfill All Weeks</button></div>';backfillAllWeeks()">
              ↓ Pull Live Historical Data
            </button>
            <button class="btn btn-ghost" onclick="loadSampleData()">Load Sample Data</button>
          </div>
        </div>
      </div>`;
    return;
  }

  const cards = weeks.map(w => {
    const prev = data.weeks.find(x => x.id === w.id - 1);
    const sp500Chg = prev ? getChange(w.sp500, prev.sp500) : null;
    return `
      <div class="archive-card">
        <div class="ac-header">
          <div>
            <div class="ac-week">Week ${w.id}</div>
            <div class="ac-date">${getWeekDate(w.id)}</div>
          </div>
          <div class="badge">W${w.id}</div>
        </div>
        <div class="ac-mini-grid">
          <div class="ac-mini-item">
            <div class="ac-mini-label">S&P 500</div>
            <div class="ac-mini-val">${w.sp500.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          </div>
          <div class="ac-mini-item">
            <div class="ac-mini-label">NASDAQ</div>
            <div class="ac-mini-val">${w.nasdaq.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          </div>
          <div class="ac-mini-item">
            <div class="ac-mini-label">VIX</div>
            <div class="ac-mini-val">${w.vix.toFixed(2)}</div>
          </div>
          <div class="ac-mini-item">
            <div class="ac-mini-label">Gold</div>
            <div class="ac-mini-val">$${w.gold.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          </div>
        </div>
        ${w.notes ? `<div class="ac-notes">${escHtml(w.notes)}</div>` : '<div class="ac-notes text-muted">No notes for this week.</div>'}
        <div class="ac-actions">
          <button class="btn btn-secondary btn-sm" onclick="navigate('detail', {weekId: ${w.id}})">View Detail</button>
          <button class="btn btn-ghost btn-sm" onclick="navigate('entry', {editId: ${w.id}})">Edit</button>
        </div>
      </div>`;
  }).join('');

  main.innerHTML = `
    <div class="view">
      <div class="sticky-bar">
        <div class="sticky-bar-title">Archive</div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="badge">${weeks.length} week${weeks.length !== 1 ? 's' : ''} tracked</span>
          <button class="btn btn-ghost btn-sm" style="border-color:var(--cyan);color:var(--cyan)" onclick="document.getElementById('backfill-panel').style.display=document.getElementById('backfill-panel').style.display==='none'?'flex':'none'">
            ↓ Pull Live Data
          </button>
        </div>
      </div>

      <div id="backfill-panel" style="display:none;align-items:center;gap:16px;flex-wrap:wrap;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:16px 20px;margin-bottom:20px">
        <div style="flex:1;min-width:200px">
          <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px">Backfill All Historical Weeks</div>
          <div style="font-size:11px;color:var(--text3)">Fetches weekly closing prices from Yahoo Finance (equities, commodities) and FRED (rates) for all weeks since Jan 22, 2025. Existing manual entries are preserved.</div>
          <div id="backfill-status" style="font-size:11px;color:var(--cyan);margin-top:6px"></div>
        </div>
        <button id="backfill-btn" class="btn btn-primary btn-sm" onclick="backfillAllWeeks()">
          ↓ Backfill All Weeks
        </button>
      </div>

      <div class="archive-search">
        <input type="text" class="search-input" placeholder="Search by week number or notes..." oninput="filterArchive(this.value)" id="archive-search">
      </div>
      <div class="archive-grid" id="archive-grid">${cards}</div>
    </div>`;
}

function filterArchive(q) {
  const data = loadData();
  const query = q.toLowerCase().trim();
  const weeks = [...data.weeks].reverse();

  const filtered = query ? weeks.filter(w => {
    return String(w.id).includes(query) ||
      getWeekDate(w.id).toLowerCase().includes(query) ||
      (w.notes && w.notes.toLowerCase().includes(query));
  }) : weeks;

  const grid = document.getElementById('archive-grid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="text-muted" style="padding:24px;grid-column:1/-1">No weeks matching your search.</div>`;
    return;
  }

  const cards = filtered.map(w => {
    return `
      <div class="archive-card">
        <div class="ac-header">
          <div>
            <div class="ac-week">Week ${w.id}</div>
            <div class="ac-date">${getWeekDate(w.id)}</div>
          </div>
          <div class="badge">W${w.id}</div>
        </div>
        <div class="ac-mini-grid">
          <div class="ac-mini-item">
            <div class="ac-mini-label">S&P 500</div>
            <div class="ac-mini-val">${w.sp500.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          </div>
          <div class="ac-mini-item">
            <div class="ac-mini-label">NASDAQ</div>
            <div class="ac-mini-val">${w.nasdaq.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          </div>
          <div class="ac-mini-item">
            <div class="ac-mini-label">VIX</div>
            <div class="ac-mini-val">${w.vix.toFixed(2)}</div>
          </div>
          <div class="ac-mini-item">
            <div class="ac-mini-label">Gold</div>
            <div class="ac-mini-val">$${w.gold.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          </div>
        </div>
        ${w.notes ? `<div class="ac-notes">${escHtml(w.notes)}</div>` : '<div class="ac-notes text-muted">No notes for this week.</div>'}
        <div class="ac-actions">
          <button class="btn btn-secondary btn-sm" onclick="navigate('detail', {weekId: ${w.id}})">View Detail</button>
          <button class="btn btn-ghost btn-sm" onclick="navigate('entry', {editId: ${w.id}})">Edit</button>
        </div>
      </div>`;
  }).join('');

  grid.innerHTML = cards;
}

// ─── TABLE VIEW ──────────────────────────────────────────────────────────────

function renderTable() {
  const main = document.getElementById('main-content');
  const data = loadData();
  const weeks = data.weeks;

  if (weeks.length === 0) {
    main.innerHTML = `<div class="view"><div class="empty-state"><div class="empty-title">No data yet</div></div></div>`;
    return;
  }

  const weekHeaders = weeks.map(w => `<th style="text-align:right;padding:8px 12px;color:var(--text2);font-weight:500;white-space:nowrap">Week ${w.id}</th>`).join('');

  let tableRows = '';
  CATS.forEach(cat => {
    const catAssets = ASSETS.filter(a => a.cat === cat.id);
    tableRows += `<tr><td colspan="${weeks.length + 1}" style="padding:10px 12px 4px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;background:var(--card2)">${cat.label}</td></tr>`;
    catAssets.forEach(a => {
      const cells = weeks.map(w => {
        const val = w[a.id];
        const prev = weeks[weeks.indexOf(w) - 1];
        const prevVal = prev ? prev[a.id] : null;
        let color = 'var(--text)';
        if (val !== null && val !== undefined && prevVal !== null && prevVal !== undefined) {
          color = val > prevVal ? 'var(--green)' : val < prevVal ? 'var(--red)' : 'var(--text)';
        }
        return `<td style="text-align:right;padding:7px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:${color}">${val !== null && val !== undefined ? fmtVal(a, val) : '—'}</td>`;
      }).join('');
      tableRows += `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:7px 12px;color:var(--text2);white-space:nowrap">
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${a.color};margin-right:7px"></span>${a.label}
        </td>
        ${cells}
      </tr>`;
    });
  });

  main.innerHTML = `
    <div class="view">
      <div class="sticky-bar">
        <div class="sticky-bar-title">Market Data Table</div>
      </div>
      <div style="overflow-x:auto;margin-top:8px">
        <table style="width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
          <thead>
            <tr style="border-bottom:2px solid var(--border)">
              <th style="text-align:left;padding:10px 12px;color:var(--text2);font-weight:600;position:sticky;left:0;background:var(--card);min-width:160px">Asset</th>
              ${weekHeaders}
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>`;
}

// ─── CHARTS ──────────────────────────────────────────────────────────────────

let chartCat = 'all';
let chartMode = 'pct';

function renderCharts(params = {}) {
  const main = document.getElementById('main-content');
  const data = loadData();
  const weeks = data.weeks;

  if (weeks.length < 2) {
    main.innerHTML = `
      <div class="view">
        <div class="sticky-bar"><div class="sticky-bar-title">Charts</div></div>
        <div class="empty-state">
          <div class="empty-title">Not enough data for charts</div>
          <div class="empty-desc">Need at least 2 weeks of data.</div>
        </div>
      </div>`;
    return;
  }

  const labels = weeks.map(w => 'Week ' + w.id);

  const assetCards = CATS.map(cat => {
    const catAssets = ASSETS.filter(a => a.cat === cat.id);
    const cards = catAssets.map(a => {
      const vals = weeks.map(w => w[a.id] ?? null);
      const canvasId = 'chart-' + a.id;
      return `
        <div class="chart-card" style="flex:1;min-width:260px;max-width:400px">
          <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px">
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${a.color}"></span>
            ${a.label}
          </div>
          <div style="height:120px"><canvas id="${canvasId}"></canvas></div>
        </div>`;
    }).join('');
    return `
      <div style="margin-bottom:28px">
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px">${cat.label}</div>
        <div style="display:flex;flex-wrap:wrap;gap:16px">${cards}</div>
      </div>`;
  }).join('');

  main.innerHTML = `
    <div class="view">
      <div class="sticky-bar"><div class="sticky-bar-title">Charts</div></div>
      ${assetCards}
    </div>`;

  // Build charts after DOM is ready
  ASSETS.forEach(a => {
    const canvas = document.getElementById('chart-' + a.id);
    if (!canvas) return;
    const vals = weeks.map(w => w[a.id] ?? null);
    new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: vals,
          borderColor: a.color,
          backgroundColor: a.color + '22',
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: a.color,
          tension: 0.3,
          fill: true,
          spanGaps: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: ctx => fmtVal(a, ctx.parsed.y) }
        }},
        scales: {
          x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1c2d45' } },
          y: { ticks: { color: '#64748b', font: { size: 10 }, callback: v => fmtVal(a, v) }, grid: { color: '#1c2d45' } }
        }
      }
    });
  });
}

function setChartCat(cat) {
  chartCat = cat;
  const data = loadData();
  // Re-render pills
  const pills = document.getElementById('cat-pills');
  if (pills) {
    pills.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    const target = [...pills.querySelectorAll('.pill')].find(p => p.textContent.trim() === (cat === 'all' ? 'All' : CATS.find(c => c.id === cat)?.label || cat));
    if (target) target.classList.add('active');
  }
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  buildChart(data.weeks);
  buildVarianceTable(data.weeks);
}

function setChartMode(mode) {
  chartMode = mode;
  const data = loadData();
  const pills = document.getElementById('mode-pills');
  if (pills) {
    pills.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    const target = [...pills.querySelectorAll('.pill')].find(p => p.textContent.trim() === (mode === 'pct' ? '% Change' : 'Raw Value'));
    if (target) target.classList.add('active');
  }
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  buildChart(data.weeks);
}

function buildChart(weeks) {
  const canvas = document.getElementById('main-chart');
  if (!canvas) return;

  const filteredAssets = chartCat === 'all' ? ASSETS : ASSETS.filter(a => a.cat === chartCat);
  const labels = weeks.map(w => 'Week ' + w.id);

  const datasets = filteredAssets.map(a => {
    let data;
    if (chartMode === 'pct') {
      const base = weeks[0][a.id];
      data = weeks.map(w => base !== 0 ? ((w[a.id] - base) / Math.abs(base)) * 100 : 0);
    } else {
      data = weeks.map(w => w[a.id]);
    }
    return {
      label: a.label,
      data,
      borderColor: a.color,
      backgroundColor: a.color + '18',
      borderWidth: 2,
      pointRadius: 4,
      pointHoverRadius: 6,
      tension: 0.3,
      fill: false,
    };
  });

  chartInstance = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true,
          position: 'bottom',
          labels: {
            color: '#94a3b8',
            font: { family: 'Inter', size: 12 },
            usePointStyle: true,
            padding: 16,
          }
        },
        tooltip: {
          backgroundColor: '#0f1a2e',
          borderColor: '#243a57',
          borderWidth: 1,
          titleColor: '#e2e8f0',
          bodyColor: '#94a3b8',
          titleFont: { family: 'Inter', size: 13, weight: '600' },
          bodyFont: { family: 'JetBrains Mono', size: 12 },
          padding: 12,
          callbacks: {
            title: (items) => {
              const idx = items[0].dataIndex;
              return `${items[0].label} — ${getWeekDate(weeks[idx].id)}`;
            },
            label: (item) => {
              const a = filteredAssets[item.datasetIndex];
              const w = weeks[item.dataIndex];
              const raw = fmtVal(a, w[a.id]);
              if (chartMode === 'pct') {
                const v = item.raw;
                return ` ${a.label}: ${raw} (${v >= 0 ? '+' : ''}${v.toFixed(2)}%)`;
              }
              return ` ${a.label}: ${raw}`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#1c2d45' },
          ticks: { color: '#64748b', font: { family: 'JetBrains Mono', size: 11 } },
        },
        y: {
          grid: { color: '#1c2d45' },
          ticks: {
            color: '#64748b',
            font: { family: 'JetBrains Mono', size: 11 },
            callback: (v) => chartMode === 'pct' ? (v >= 0 ? '+' : '') + v.toFixed(1) + '%' : v.toLocaleString(),
          },
          title: {
            display: true,
            text: chartMode === 'pct' ? '% Change from Week 1' : 'Raw Value',
            color: '#64748b',
            font: { family: 'Inter', size: 11 },
          }
        }
      }
    }
  });
}

function buildVarianceTable(weeks) {
  const wrap = document.getElementById('variance-table-wrap');
  if (!wrap || weeks.length < 2) return;

  const filteredAssets = chartCat === 'all' ? ASSETS : ASSETS.filter(a => a.cat === chartCat);

  let headers = '<th>Asset</th>';
  weeks.forEach(w => { headers += `<th>W${w.id}</th>`; });

  let rows = '';
  filteredAssets.forEach(a => {
    let cells = `<td><div class="asset-name-cell"><span class="asset-dot" style="background:${a.color}"></span>${a.label}</div></td>`;
    weeks.forEach((w, i) => {
      const prior = i > 0 ? weeks[i - 1] : null;
      if (!prior) {
        cells += `<td class="neutral" style="text-align:right"><div class="var-cell"><span class="var-abs">—</span></div></td>`;
        return;
      }
      const chg = getChange(w[a.id], prior[a.id]);
      const cls = chgClass(chg.abs);
      cells += `<td class="${cls}" style="text-align:right"><div class="var-cell">
        <span class="var-abs ${cls}">${fmtChg(chg.abs, a.dec)}</span>
        <span class="var-pct ${cls}">${fmtPct(chg.pct)}</span>
      </div></td>`;
    });
    rows += `<tr class="data-row">${cells}</tr>`;
  });

  wrap.innerHTML = `
    <table class="variance-table">
      <thead><tr>${headers}</tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ─── DETAIL VIEW ─────────────────────────────────────────────────────────────

function renderDetail(params = {}) {
  const main = document.getElementById('main-content');
  const data = loadData();
  const week = data.weeks.find(w => w.id === params.weekId);

  if (!week) {
    main.innerHTML = `<div class="view"><div class="empty-state"><div class="empty-title">Week not found</div><button class="btn btn-primary" onclick="navigate('archive')">Back to Archive</button></div></div>`;

  const prior = data.weeks.find(w => w.id === week.id - 1);

  main.innerHTML = `

        Back to Archive

      <div class="sticky-bar">
        <div class="sticky-bar-title">Week ${week.id} — ${getWeekDate(week.id)}</div>

          <button class="btn btn-ghost btn-sm" onclick="downloadCSV(${week.id})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download CSV
          </button>
          <button class="btn btn-secondary btn-sm" onclick="navigate('entry', {editId: ${week.id}})">Edit Week</button>

      </div>

      ${notesHTML}
    </div>`;
}

// ─── CSV DOWNLOAD ─────────────────────────────────────────────────────────────

function downloadCSV(weekId) {
  const data = loadData();
  const headers = ['Week', 'Date', ...ASSETS.map(a => a.id), 'Notes'];
  const weeks = weekId ? data.weeks.filter(w => w.id === weekId) : data.weeks;

  const rows = weeks.map(w => {
    const vals = ASSETS.map(a => w[a.id] !== undefined ? w[a.id] : '');
    const notes = (w.notes || '').replace(/"/g, '""');
    return [w.id, getWeekDate(w.id), ...vals, `"${notes}"`];
  });

  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = weekId ? `marketpulse_week${weekId}.csv` : 'marketpulse_all.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV downloaded', 'success');
}

// ─── SAMPLE DATA ─────────────────────────────────────────────────────────────

function loadSampleData() {
  saveData(SAMPLE_DATA);
  toast('Data loaded — 6 weeks', 'success');
  navigate('dashboard');
}

// ─── UTILS ───────────────────────────────────────────────────────────────────

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ─── INIT ────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', async () => {
  setupTooltips();
  await Promise.all([loadFromAPI(), loadPerfData()]);
  navigate('dashboard');
});
